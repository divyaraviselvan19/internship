<!DOCTYPE html>
<html>

<head>
    <style>
        .loader {
            width: 40px;
            height: 40px;
            border: 5px solid gray;
            border-top: 5px solid blue;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="loader"></div>

</body>

</html>
