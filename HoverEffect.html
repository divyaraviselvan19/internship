<!DOCTYPE html>
<html>

<head>
  <style>
    button {
      padding: 12px 30px;
      background: blue;
      color: white;
      border: none;
      border-radius: 20px;
      transition: 0.3s;
    }

    button:hover {
      background: green;
      transform: scale(1.1);
    }
  </style>
</head>

<body>

  <button>Hover me</button>

</body>

</html>
