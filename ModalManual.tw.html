<!DOCTYPE html>
<html>

<head>
    <title>Tailwind Modal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

    <button onclick="document.getElementById('modal').classList.remove('hidden')"
        class="bg-indigo-600 text-white px-5 py-2 rounded-lg">
        Open Modal
    </button>

    <div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">

        <div class="bg-white p-6 rounded-2xl shadow-xl w-80 text-center">
            <h2 class="text-2xl font-bold mb-3">
                Hello Divya
            </h2>

            <p class="text-gray-600 mb-4">
                Welcome to Tailwind Modal
            </p>

            <button onclick="document.getElementById('modal').classList.add('hidden')"
                class="bg-red-500 text-white px-4 py-2 rounded-lg">
                Close
            </button>
        </div>

    </div>

</body>

</html>
