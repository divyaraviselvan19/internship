<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <title>Product Cards</title>

    <style>
        .product-card {
            border: none;
            position: relative;
        }

        .product-card img {
            height: 280px;
            object-fit: contain;
        }

        .wishlist {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #ccc;
            font-size: 20px;
        }

        .rating {
            background: green;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 14px;
        }

        .price {
            font-size: 28px;
            font-weight: bold;
        }

        .discount {
            color: green;
            font-weight: bold;
        }

        .stock {
            color: #d6006e;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <div class="container py-5">
        <div class="row">

            <div class="col-md-4">
                <div class="card product-card">
                    <i class="fa-solid fa-heart wishlist"></i>

                    <img src="C:\Users\acer\Pictures\WhatsApp Image 2026-06-04 at 4.25.51 PM.jpeg" class="card-img-top">

                    <div class="card-body">
                        <h5>Smart Water Bottle</h5>

                        <span class="rating">4 ★</span>
                        <span>(2,020)</span>

                        <h4 class="price">₹118</h4>

                        <del>₹599</del>
                        <span class="discount">80% off</span>

                        <p class="stock mt-2">Only few left</p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card product-card">
                    <i class="fa-solid fa-heart wishlist"></i>

                    <img src="C:\Users\acer\Pictures\WhatsApp Image 2026-06-04 at 4.27.22 PM.jpeg" class="card-img-top">

                    <div class="card-body">
                        <h5>Steel Water Bottle</h5>

                        <span class="rating">4.1 ★</span>
                        <span>(16,395)</span>

                        <h4 class="price">₹178</h4>

                        <del>₹499</del>
                        <span class="discount">64% off</span>

                        <p class="stock mt-2">Only few left</p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card product-card">
                    <i class="fa-solid fa-heart wishlist"></i>

                    <img src="C:\Users\acer\Pictures\WhatsApp Image 2026-06-04 at 4.28.17 PM.jpeg" class="card-img-top">

                    <div class="card-body">
                        <h5>Motivational Bottle</h5>

                        <span class="rating">4.1 ★</span>
                        <span>(23,274)</span>

                        <h4 class="price">₹164</h4>

                        <del>₹1288</del>
                        <span class="discount">87% off</span>

                        <p class="stock mt-2">Only few left</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
