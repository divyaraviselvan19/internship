<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            background: #f2f2f2;
            font-family: serif;
        }

        .box {
            background: white;
            width: 700px;
            margin: auto;
            margin-top: 50px;
            padding: 40px;
            border-radius: 20px;
        }

        h1 {
            text-align: center;
        }

        input,
        textarea {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 18px;
        }

        .row {
            display: flex;
            gap: 20px;
        }

        textarea {
            height: 150px;
        }

        button {
            background: rgb(86, 139, 16);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 20px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="box">

        <h1>Send me a message</h1>

        <input type="text" placeholder="Enter Your Name">

        <div class="row">
            <input type="email" placeholder="Enter Your Email">
            <input type="text" placeholder="Phone Number">
        </div>

        <textarea placeholder="Write Message"></textarea>

        <button>Send Message</button>

    </div>

</body>

</html>
