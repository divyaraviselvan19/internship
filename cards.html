<!DOCTYPE html>
<html>

<head>
    <title>Cards</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .card-box {
            height: 500px;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            color: white;
        }

        .card-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
        }

        .content {
            position: absolute;
            top: 50%;
            left: 30px;
            transform: translateY(-50%);
        }

        .content h2 {
            font-size: 42px;
            font-weight: bold;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <div class="container py-5">
        <div class="row g-4">

            <div class="col-md-4">
                <div class="card-box">
                    <img src="https://picsum.photos/400/600?1">
                    <div class="overlay"></div>

                    <div class="content">
                        <h2>Short title,<br>long jacket</h2>
                    </div>

                    <div class="footer">
                        <span>🌍 Earth</span>
                        <span>📅 3d</span>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card-box">
                    <img src="https://picsum.photos/400/600?2">
                    <div class="overlay"></div>

                    <div class="content">
                        <h2>Much longer title that wraps to multiple lines</h2>
                    </div>

                    <div class="footer">
                        <span>📍 Pakistan</span>
                        <span>📅 4d</span>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card-box">
                    <img src="https://picsum.photos/400/600?3">
                    <div class="overlay"></div>

                    <div class="content">
                        <h2>Another longer title belongs here</h2>
                    </div>

                    <div class="footer">
                        <span>📍 California</span>
                        <span>📅 5d</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
