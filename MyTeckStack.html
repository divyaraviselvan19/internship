<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tech Stack</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #0b1020;
            color: white;
            padding: 40px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 45px;
            color: #7dd3fc;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tabs button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: #151c30;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        .tabs button.active {
            background: #7dd3fc;
            color: black;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background: #141b2d;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            background: #1d2945;
        }

        .card img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .card h2 {
            font-size: 24px;
        }
    </style>
</head>

<body>

    <h1>My Tech Stack</h1>

    <div class="tabs">
        <button class="active">All (25)</button>
        <button>Languages (7)</button>
        <button>Tools (8)</button>
        <button>Libraries (5)</button>
        <button>Databases (4)</button>
    </div>

    <div class="container">

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/6132/6132222.png">
            <h2>C</h2>
        </div>

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/6132/6132221.png">
            <h2>C++</h2>
        </div>

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/5968/5968350.png">
            <h2>Python</h2>
        </div>

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/226/226777.png">
            <h2>Java</h2>
        </div>

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/732/732212.png">
            <h2>HTML</h2>
        </div>

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/732/732190.png">
            <h2>CSS</h2>
        </div>

        <div class="card">
            <img src="https://numpy.org/images/logo.svg">
            <h2>Numpy</h2>
        </div>

        <div class="card">
            <img src="https://pandas.pydata.org/static/img/pandas_mark.svg">
            <h2>Pandas</h2>
        </div>

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/919/919836.png">
            <h2>MySQL</h2>
        </div>

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/5968/5968342.png">
            <h2>PostgreSQL</h2>
        </div>



        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/1126/1126012.png">
            <h2>React</h2>
        </div>

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/4248/4248443.png">
            <h2>SQL</h2>
        </div>

    </div>

</body>

</html>
