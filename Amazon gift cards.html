<!DOCTYPE html>
<html>

<head>
    <title>Amazon Gift Cards</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .card {
            width: 300px;
            border: 1px solid #ddd;
            border-radius: 25px;
            overflow: hidden;
            background: white;
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .card h2 {
            padding: 20px;
            font-size: 40px;
        }
    </style>
</head>

<body>

    <h1>Explore Popular Amazon Pay Gift Cards</h1>

    <div class="container">

        <div class="card">
            <img src="C:\Users\acer\Pictures\WhatsApp Image 2026-06-04 at 5.27.34 PM.jpeg" alt="Your Photo">
            <h2>Your Photo</h2>
        </div>

        <div class="card">
            <img src="https://media.giphy.com/media/He4wudo59enf2/giphy.gif" alt="Birthday Cake">
            <h2>Animated</h2>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1549465220-1a8b9238cd48" alt="Gift Box">
            <h2>Physical</h2>
        </div>

    </div>

</body>

</html>
