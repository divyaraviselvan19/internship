<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

  <div class="max-w-md mx-auto mt-10 bg-white p-6 rounded-lg shadow">
    <h2 class="text-2xl font-bold mb-4">Contact Form</h2>

    <form>
      <div class="mb-4">
        <label class="block mb-2">Name</label>
        <input type="text"
          placeholder="Enter your name"
          class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div class="mb-4">
        <label class="block mb-2">Email</label>
        <input type="email"
          placeholder="Enter your email"
          class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div class="mb-4">
        <label class="block mb-2">Message</label>
        <textarea rows="4"
          class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
      </div>

      <button type="submit"
        class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
        Submit
      </button>
    </form>
  </div>

</body>
</html>
