<html>

        }

        .box {
            width: 50px;
            height: 50px;
            margin: 5px;
            background: dodgerblue;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

</head>

<body bgcolor="#ff547">

    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
    </div>

</body>

</html>
